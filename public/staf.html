<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Result</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      padding: 30px;
    }
    h1 {
      text-align: center;
      color: #333;
    }
    form {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <h1>Submit Your Test Result</h1>
  <form id="resultForm">
    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Register No:</label>
    <input type="text" id="regno" required>

    <label>Email:</label>
    <input type="email" id="email" required>

    <label>Score:</label>
    <input type="number" id="score" required>

    <button type="submit">Submit</button>
  </form>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js"></script>

  <script>
    // 🔹 உன் Firebase Config details இங்கே paste பண்ணணும்
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "aptitude-test-project.firebaseapp.com",
      projectId: "aptitude-test-project",
      storageBucket: "aptitude-test-project.appspot.com",
      messagingSenderId: "YOUR_MSG_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Form Submit → Save to Firestore
    document.getElementById("resultForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const regno = document.getElementById("regno").value;
      const email = document.getElementById("email").value;
      const score = document.getElementById("score").value;

      try {
        await db.collection("results").add({
          name: name,
          regno: regno,
          email: email,
          score: score
        });
        alert("✅ Result submitted successfully!");
        document.getElementById("resultForm").reset();
      } catch (error) {
        console.error("Error submitting result: ", error);
        alert("❌ Something went wrong!");
      }
    });

  measurementId: "G-V5VF417VCG"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
  </script>
</body>
</html>
