<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>MindSpark — Result</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top left, #1e293b, #0f172a);
      color: #f8fafc;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .card {
      background: rgba(15,23,42,0.95);
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
      width: 420px;
      text-align: center;
      animation: popIn 0.9s ease-out;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content:"";
      position:absolute;
      top:-50%;
      left:-50%;
      width:200%;
      height:200%;
      background: conic-gradient(from 90deg, #34d399, #60a5fa, #a78bfa, #34d399);
      animation: rotate 6s linear infinite;
      opacity:0.2;
    }
    .content {
      position: relative;
      z-index: 2;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 8px;
      color: #60a5fa;
    }
    .line {
      height: 4px;
      width: 90px;
      margin: 0 auto 20px;
      background: linear-gradient(90deg,#34d399,#60a5fa,#818cf8);
      border-radius: 3px;
    }
    .info {
      margin: 12px 0;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      text-align: left;
      font-size: 15px;
      transition: transform 0.3s;
    }
    .info:hover { transform: scale(1.03); }
    .status-box {
      margin-top: 25px;
      padding: 14px;
      border-radius: 14px;
      font-size: 22px;
      font-weight: 600;
      background: rgba(255,255,255,0.08);
      box-shadow: inset 0 0 12px rgba(255,255,255,0.2);
    }
    .pass { color: #22c55e; }
    .fail { color: #ef4444; }
    @keyframes popIn {
      from {opacity:0;transform:scale(0.8);}
      to {opacity:1;transform:scale(1);}
    }
    @keyframes rotate {
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="content">
      <h1>Exam Result</h1>
      <div class="line"></div>
      <div id="resultBox">Loading...</div>
    </div>
  </div>

<script>
const API = "YOUR_WEB_APP_URL"; // 👉 Replace with your Google Apps Script URL

async function loadResult() {
  try {
    const reg = localStorage.getItem("reg");
    const email = localStorage.getItem("email");

    if(!reg && !email) {
      document.getElementById("resultBox").innerHTML = "<p>⚠️ No student info found.</p>";
      return;
    }

    const res = await fetch(API);
    const data = await res.json();

    let row = data.find(r => (r.Reg === reg) || (r.Email === email));
    if(!row) {
      document.getElementById("resultBox").innerHTML = "<p>⚠️ No result found for you.</p>";
      return;
    }

    const pct = Number(row.Percentage||0);
    const status = pct >= 40 ? `<span class="pass">✅ PASS</span>` : `<span class="fail">❌ FAIL</span>`;

    document.getElementById("resultBox").innerHTML = `
      <div class="info"><b>👤 Name:</b> ${row.Name||''}</div>
      <div class="info"><b>🆔 Reg:</b> ${row.Reg||''}</div>
      <div class="info"><b>📧 Email:</b> ${row.Email||''}</div>
      <div class="info"><b>📝 Score:</b> ${row.Score||0}/${row.Total||0}</div>
      <div class="info"><b>📊 Percentage:</b> ${pct.toFixed(2)}%</div>
      <div class="info"><b>⏱ Duration:</b> ${row['Duration(min)']||0} min</div>
      <div class="status-box">Result: ${status}</div>
    `;
  } catch (err) {
    document.getElementById("resultBox").innerHTML = "<p>⚠️ Error loading result.</p>";
  }
}
loadResult();
// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyCof1zHVBekOErvuGxC92XM_tENvHnn18M",
  authDomain: "aptitude-test-project.firebaseapp.com",
  projectId: "aptitude-test-project",
  storageBucket: "aptitude-test-project.firebasestorage.app",
  messagingSenderId: "934447717890",
  appId: "1:934447717890:web:1068fa8a19b2dc66e3511b",
  measurementId: "G-V5VF417VCG"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
</script>
</body>
</html>
